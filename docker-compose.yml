services:
  db:
    image: postgres:16
    container_name: ptec_abaqus_postgres
    environment:
      POSTGRES_DB: ptec_abaqus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
